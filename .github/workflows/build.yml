name: Build RawCodEt

# Разрешаем воркфлоу создавать релизы
permissions:
  contents: write

on:
  push:
    branches: [ dev, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ dev, main ]

jobs:
  # ==================== WINDOWS ====================
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.7.2'
        modules: 'qtwebengine qtwebchannel qtpositioning'
        cache: 'true'

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release "-DCMAKE_PREFIX_PATH=${{ env.QT_ROOT_DIR }}"

    - name: Build
      run: |
        cd build
        cmake --build . --config Release

    - name: Deploy Qt Dependencies
      run: |
        cd bin
        $qtBin = "$env:QT_ROOT_DIR\bin"
        $qtPlugins = "$env:QT_ROOT_DIR\plugins"

        Write-Host "=== Copying core DLLs ==="
        $dlls = @(
            "Qt6Core.dll", "Qt6Gui.dll", "Qt6Widgets.dll", "Qt6Network.dll",
            "Qt6Sql.dll", "Qt6WebEngineCore.dll", "Qt6WebEngineWidgets.dll",
            "Qt6WebChannel.dll", "Qt6Positioning.dll", "Qt6OpenGL.dll",
            "Qt6OpenGLWidgets.dll", "Qt6QuickWidgets.dll", "Qt6Quick.dll",
            "Qt6Qml.dll", "Qt6QmlModels.dll", "Qt6QmlWorkerScript.dll",
            "Qt6PrintSupport.dll", "Qt6QmlMeta.dll", "Qt6QuickControls2.dll",
            "Qt6QuickTemplates2.dll", "Qt6QuickLayouts.dll"
        )
        foreach ($dll in $dlls) {
            $src = "$qtBin\$dll"
            if (Test-Path $src) { Copy-Item $src ".\" -Force }
        }

        Write-Host "=== Copying plugin folders ==="
        foreach ($dir in @("platforms", "imageformats", "networkinformation", "tls", "styles", "iconengines", "sqldrivers", "webview", "printsupport")) {
            $src = "$qtPlugins\$dir"
            if (Test-Path $src) { Copy-Item $src ".\" -Recurse -Force }
        }

        Write-Host "=== Copying WebEngine resources ==="
        if (Test-Path "$env:QT_ROOT_DIR\resources") {
            New-Item -ItemType Directory -Force -Path "resources" | Out-Null
            Copy-Item "$env:QT_ROOT_DIR\resources\*" ".\resources\" -Recurse -Force
        }
        if (Test-Path "$env:QT_ROOT_DIR\translations\qtwebengine_locales") {
            New-Item -ItemType Directory -Force -Path "translations" | Out-Null
            Copy-Item "$env:QT_ROOT_DIR\translations\qtwebengine_locales" ".\translations\" -Recurse -Force
        }
        if (Test-Path "$qtBin\QtWebEngineProcess.exe") {
            Copy-Item "$qtBin\QtWebEngineProcess.exe" ".\" -Force
        }

        "[Paths]`nPlugins = .`nLibraries = .`nImports = .`nQml2Imports = ." | Out-File -FilePath "qt.conf" -Encoding ASCII

    - name: Download and Setup Monaco Editor
      run: |
        cd bin
        $monacoVersion = "0.52.0"
        $monacoUrl = "https://cdn.jsdelivr.net/npm/monaco-editor@$monacoVersion/min/vs"
        New-Item -ItemType Directory -Force -Path "monaco-editor/vs" | Out-Null

        $files = @(
            "loader.js", "editor/editor.main.js", "editor/editor.main.css", "editor/editor.main.nls.js",
            "base/worker/workerMain.js", "basic-languages/monaco.contribution.js",
            "language/json/json.worker.js", "language/css/css.worker.js", "language/html/html.worker.js",
            "language/typescript/ts.worker.js", "language/typescript/tsMode.js"
        )
        foreach ($file in $files) {
            $dest = "monaco-editor/vs/$file"
            New-Item -ItemType Directory -Force -Path (Split-Path $dest) | Out-Null
            try { Invoke-WebRequest -Uri "$monacoUrl/$file" -OutFile $dest -UseBasicParsing } catch {}
        }

    - name: Copy Additional Files
      run: |
        cd bin
        if (Test-Path "..\client\editor.html") { Copy-Item "..\client\editor.html" ".\editor.html" -Force }
        if (Test-Path "..\console\users.json") { Copy-Item "..\console\users.json" ".\users.json" -Force }

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RawCodEt-Windows
        # Загружаем папки напрямую, без лишней архивации
        path: |
          bin/
          lib/

  # ==================== LINUX ====================
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.7.2'
        modules: 'qtwebengine qtwebchannel qtpositioning'
        cache: 'true'

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build patchelf

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT_DIR }}" \
          -DCMAKE_INSTALL_RPATH='\$ORIGIN' \
          -DCMAKE_BUILD_RPATH='\$ORIGIN'

    - name: Build
      run: |
        cd build
        cmake --build . --config Release

    - name: Deploy Qt Dependencies
      run: |
        cd bin
        QT_LIB="$QT_ROOT_DIR/lib"
        QT_PLUGINS="$QT_ROOT_DIR/plugins"

        echo "=== Copying core .so files ==="
        for lib in "$QT_LIB"/libQt6*.so*; do
            [ -f "$lib" ] && cp -v "$lib" . 2>/dev/null || true
        done

        echo "=== Copying plugin folders ==="
        for dir in platforms imageformats networkinformation tls styles iconengines sqldrivers webview printsupport; do
            [ -d "$QT_PLUGINS/$dir" ] && cp -rv "$QT_PLUGINS/$dir" . 2>/dev/null || true
        done

        echo "=== Copying WebEngine resources ==="
        [ -d "$QT_ROOT_DIR/resources" ] && { mkdir -p resources; cp -rv "$QT_ROOT_DIR/resources/"* ./resources/ 2>/dev/null || true; }
        [ -d "$QT_ROOT_DIR/translations/qtwebengine_locales" ] && { mkdir -p translations; cp -rv "$QT_ROOT_DIR/translations/qtwebengine_locales" ./translations/ 2>/dev/null || true; }
        [ -f "$QT_ROOT_DIR/libexec/QtWebEngineProcess" ] && cp -v "$QT_ROOT_DIR/libexec/QtWebEngineProcess" . 2>/dev/null || true

        echo "=== Fixing RPATH ==="
        for exe in client server; do
            [ -f "$exe" ] && patchelf --set-rpath '$ORIGIN' "$exe" 2>/dev/null || true
        done

        cat > qt.conf << 'EOF'
        [Paths]
        Plugins = .
        Libraries = .
        Imports = .
        Qml2Imports = .
        EOF

    - name: Download and Setup Monaco Editor
      run: |
        cd bin
        MONACO_VERSION="0.52.0"
        MONACO_URL="https://cdn.jsdelivr.net/npm/monaco-editor@$MONACO_VERSION/min/vs"
        mkdir -p "monaco-editor/vs"

        FILES=("loader.js" "editor/editor.main.js" "editor/editor.main.css" "editor/editor.main.nls.js" "base/worker/workerMain.js" "basic-languages/monaco.contribution.js" "language/json/json.worker.js" "language/css/css.worker.js" "language/html/html.worker.js" "language/typescript/ts.worker.js" "language/typescript/tsMode.js")
        for file in "${FILES[@]}"; do
            dest="monaco-editor/vs/$file"
            mkdir -p "$(dirname "$dest")"
            curl -sL "$MONACO_URL/$file" -o "$dest" || true
        done

    - name: Copy Additional Files
      run: |
        cd bin
        [ -f "../client/editor.html" ] && cp -v "../client/editor.html" "./editor.html" || true
        [ -f "../console/users.json" ] && cp -v "../console/users.json" "./users.json" || true

    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RawCodEt-Linux
        # Загружаем папки напрямую, без лишней архивации
        path: |
          bin/
          lib/

  # ==================== RELEASE (Архивируем СТРОГО ОДИН РАЗ здесь) ====================
  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download Windows artifacts
      uses: actions/download-artifact@v4
      with:
        name: RawCodEt-Windows
        path: windows-build

    - name: Download Linux artifacts
      uses: actions/download-artifact@v4
      with:
        name: RawCodEt-Linux
        path: linux-build

    - name: Package for Release (Single Archive)
      run: |
        # Архивируем ОДИН раз прямо перед загрузкой в релиз
        cd windows-build
        zip -r ../RawCodEt-Windows.zip bin lib
        cd ..

        cd linux-build
        tar -czf ../RawCodEt-Linux.tar.gz bin lib
        cd ..

    - name: Create/Update GitHub Release
      uses: ncipollo/release-action@v1
      with:
        name: "Latest Build"
        tag: "latest"
        body: |
          ## RawCodEt - Latest Build

          **Commit**: ${{ github.sha }}

          ### Downloads
          - **Windows**: RawCodEt-Windows.zip
          - **Linux**: RawCodEt-Linux.tar.gz

          ### Installation
          **Windows**: Распакуйте ZIP. Внутри будут папки `bin` и `lib`. Запустите `bin\client.exe`

          **Linux**:
          ```bash
          tar -xzf RawCodEt-Linux.tar.gz
          chmod +x bin/client bin/server
          ./bin/client
          ```
        artifacts: |
          RawCodEt-Windows.zip
          RawCodEt-Linux.tar.gz
        allowUpdates: true
        replacesArtifacts: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
